name: Deploy AsciiDoc to GitHub Pages

on:
  push:
    branches:
      - main # Zmień na master, jeśli to Twój główny branch

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Build AsciiDoc and Create Redirect
        run: |
          # 1. Tworzymy folder roboczy 'output' i w nim folder 'res'
          mkdir -p output/res
          
          # 2. Kompilujemy pliki z docs/ do output/res/, zachowując strukturę
          asciidoctor -R docs -D output/res 'docs/**/*.adoc'
          
          # 3. Tworzymy plik index.html w katalogu głównym, który automatycznie 
          # przekieruje użytkownika do folderu /res/
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0; url=./res/"></head><body>Przekierowywanie do <a href="./res/">folderu res</a>...</body></html>' > output/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Wysyłamy cały folder output (zawiera index.html oraz folder res/)
          path: 'output/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
