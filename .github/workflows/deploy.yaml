name: Build AsciiDoc and Commit to Repo

on:
  push:
    branches:
      - main # Zmień na master, jeśli tak nazywa się Twój główny branch

# Potrzebujemy uprawnień do zapisu (write), aby móc zrobić push do repozytorium
permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Build AsciiDoc to HTML
        run: |
          mkdir -p res
          # Kompilujemy pliki z docs/ do folderu res/ zachowując strukturę
          asciidoctor -R docs -D res 'docs/**/*.adoc'

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add res/
          
          # Sprawdza czy są jakieś zmiany do zapisania, żeby nie wywalać błędu
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "chore: automatyczna kompilacja AsciiDoc do HTML"
            git push
          else
            echo "Brak nowych zmian do zapisania."
          fi
