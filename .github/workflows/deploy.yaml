name: Deploy AsciiDoc to GitHub Pages

on:
  push:
    branches:
      - main # Zmień na master, jeśli takiej nazwy używasz

# Uprawnienia potrzebne do wdrożenia na GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Zapobiega nakładaniu się kilku wdrożeń jednocześnie
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install Asciidoctor
        run: gem install asciidoctor

      - name: Build AsciiDoc to HTML
        run: |
          # Tworzymy strukturę katalogów wewnątrz tymczasowego folderu 'build'
          mkdir -p build/res
          
          # Kompilujemy pliki zachowując strukturę z folderu docs/ do build/res/
          asciidoctor -R docs -D build/res 'docs/**/*.adoc'

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Wskazujemy folder build jako źródło strony
          path: 'build/'

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
